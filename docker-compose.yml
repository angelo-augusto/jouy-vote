services:
  opencode:
    build: .
    container_name: jouyvote-opencode
    # Isolation demandée par Angelo (modèle externe via OpenRouter, confiance limitée) :
    # - Aucun accès au socket Docker de l'hôte (pas de docker-in-docker).
    # - Aucun mode privileged, aucun --network host.
    # - Seul le répertoire du projet est monté : lecture/écriture limitées à /workspace,
    #   rien d'autre du système de fichiers hôte n'est visible depuis le conteneur.
    # - Réseau bridge Docker par défaut : sortie internet nécessaire pour l'API OpenRouter.
    # - SEULE entrée exposée : SSH (port 2222→22), demandé par Angelo le 2026-07-20 pour un accès
    #   portable si le Docker déménage sur un autre serveur — authentification par clé publique
    #   uniquement (voir Dockerfile), pas de mot de passe, root désactivé dans sshd_config.
    volumes:
      - ./:/workspace
      # Espace de stockage additionnel sur le grand disque (/mnt/stockage, 437G libres) plutôt
      # que la racine (98% pleine) — demandé par Angelo le 2026-07-21.
      - /mnt/stockage/jouyvote:/mnt/jouyvote
      # Volume dédié pour les clés SSH autorisées : sans ça, toute clé ajoutée à chaud (docker
      # exec) vit dans la couche writable du conteneur et disparaît à la prochaine recréation
      # (vécu le 2026-07-21 — la clé Termius ajoutée à chaud a été perdue en même temps que le
      # mount /mnt/jouyvote ci-dessus). Un volume nommé, monté sur un répertoire non vide de
      # l'image, est seedé automatiquement avec son contenu (la clé Dell-Papa du Dockerfile) au
      # premier démarrage puis persiste indépendamment de toute recréation/rebuild suivant.
      - jouyvote_ssh:/home/coder/.ssh
    working_dir: /workspace
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    ports:
      - "2222:22"
    security_opt:
      - no-new-privileges:true
    read_only: false  # le code doit pouvoir écrire dans /workspace
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: jouyvote-web
    # Conteneur de PRODUCTION, volontairement séparé du conteneur de dev/OpenCode ci-dessus —
    # image minimale (pas de Node, pas d'OpenCode, pas de SSH), c'est LUI que le tunnel
    # Cloudflare doit exposer publiquement sur jouyvote.fr, jamais le conteneur de dev.
    environment:
      - JOUY_ADMIN_KEY=${JOUY_ADMIN_KEY}
      - JOUY_VOTE_PEPPER=${JOUY_VOTE_PEPPER}
    volumes:
      - jouyvote_data:/data
    # Lié uniquement à l'interface loopback de l'hôte : le tunnel Cloudflare (cloudflared, hors
    # conteneur) s'y connecte en local, aucune exposition directe au réseau extérieur en dehors
    # du tunnel — c'est lui, pas ce port, qui doit être la seule porte d'entrée publique.
    ports:
      - "127.0.0.1:8000:8000"
    security_opt:
      - no-new-privileges:true
    read_only: false  # écriture de la base SQLite dans /data (volume dédié)
    restart: unless-stopped

  wiki:
    image: dokuwiki/dokuwiki:latest
    container_name: jouyvote-wiki
    # DokuWiki (PHP/Apache) volontairement dans son propre conteneur, séparé de jouyvote-web
    # (FastAPI) : deux runtimes différents, pas de raison de les mélanger. Exposé publiquement
    # sur wiki.jouyvote.fr via le même tunnel Cloudflare que le site principal.
    volumes:
      - jouyvote_wiki_storage:/storage
    ports:
      - "127.0.0.1:8081:8080"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  jouyvote_data:
  jouyvote_wiki_storage:
  jouyvote_ssh:
